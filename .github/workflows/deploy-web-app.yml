name: Deploy Hooked Web App

on:
  push:
    branches: [main, develop, 'feature/web-app']
    paths: ['hooked-web-app/**']
  pull_request:
    branches: [main, develop]
    paths: ['hooked-web-app/**']

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_WEB_APP }}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: hooked-web-app/package-lock.json

      - name: Install dependencies
        working-directory: hooked-web-app
        run: npm ci

      - name: Run linting
        working-directory: hooked-web-app
        run: npm run lint

      - name: Type check
        working-directory: hooked-web-app
        run: npx tsc --noEmit

      - name: Run build test
        working-directory: hooked-web-app
        run: npm run build

      - name: Run Playwright tests
        working-directory: hooked-web-app
        run: npx playwright test || echo "Playwright tests not configured yet"

  deploy-staging:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/feature/web-app' || (github.event_name == 'pull_request' && github.base_ref == 'develop')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install --global vercel@canary

      - name: Pull Vercel environment information
        working-directory: hooked-web-app
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build project artifacts
        working-directory: hooked-web-app
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to staging
        working-directory: hooked-web-app
        id: deploy-staging
        run: |
          URL=$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }})
          echo "preview_url=$URL" >> $GITHUB_OUTPUT
          echo "Staging deployment: $URL"

      - name: Comment PR with staging link
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🚀 **Web App Staging Deployment Ready!**\n\n📱 Preview URL: ${{ steps.deploy-staging.outputs.preview_url }}\n\n*This is a mobile-only application. Please test on mobile devices.*`
            })

  deploy-production:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install --global vercel@canary

      - name: Pull Vercel environment information
        working-directory: hooked-web-app
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build project artifacts
        working-directory: hooked-web-app
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to production
        working-directory: hooked-web-app
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Run Lighthouse CI for performance validation
        working-directory: hooked-web-app
        run: |
          npm install -g @lhci/cli@0.12.x
          lhci autorun --config=lighthouse.config.js || echo "Lighthouse CI config not found"

  performance-check:
    runs-on: ubuntu-latest
    needs: deploy-staging
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Lighthouse CI
        run: npm install -g @lhci/cli@0.12.x

      - name: Run Lighthouse CI
        run: |
          lhci autorun --config=lighthouse.config.js || echo "Lighthouse CI config not found - skipping performance check"